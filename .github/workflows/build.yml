---
name: Build and Push OCI Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
  schedule:
    # Rebuild weekly (Saturday 03:00 UTC) so the base bluefin-dx layer stays fresh
    - cron: "0 3 * * 6"
  workflow_dispatch:

env:
  IMAGE_NAME: caelestia-bluefin
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  BASE_IMAGE: ghcr.io/ublue-os/bluefin-dx:latest

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write # for Sigstore keyless signing

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Image metadata ───────────────────────────────────────────────────────
      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build OCI image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          containerfiles: ./Containerfile
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          # Allow network access for git clone / package downloads in build.sh
          extra-args: |
            --network=host

      # ── Smoke test ──────────────────────────────────────────────────────────
      - name: Verify caelestia-shell binary exists in image
        run: |
          podman run --rm ${{ steps.build.outputs.image-with-tag }} \
            sh -c 'command -v qs && find / -name shell.qml 2>/dev/null || echo "shell.qml not found anywhere"'

      # ── Push (main branch only) ─────────────────────────────────────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}

      # ── Sigstore signing ─────────────────────────────────────────────────────
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with GitHub OIDC token (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          IMAGE_WITH_DIGEST="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          # GHCR requires lowercase — convert just in case
          IMAGE_WITH_DIGEST="${IMAGE_WITH_DIGEST,,}"
          echo "Signing ${IMAGE_WITH_DIGEST}"
          cosign sign --yes "${IMAGE_WITH_DIGEST}"